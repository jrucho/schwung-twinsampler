name: Release Module

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build module package
        run: bash scripts/build.sh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/twinsampler-module.tar.gz
